<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paginas de GrandBlue</title>
    <style>
        body {
            background-color: #c9e8f0;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: #0077b6;
            font-size: 2em;
        }

        p {
            color: #555;
            font-size: 1.1em;
        }

        .botones {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .tarjeta {
            background-color: white;
            border-radius: 10px;
            padding: 24px 30px;
            width: 200px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }

        .tarjeta h3 {
            margin-bottom: 12px;
        }

        .tarjeta-1 h3 { color: #0077b6; }
        .tarjeta-2 h3 { color: #2a9d8f; }

        .tarjeta a {
            display: inline-block;
            padding: 10px 20px;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.95em;
        }

        .tarjeta-1 a { background-color: #0077b6; }
        .tarjeta-1 a:hover { background-color: #005f99; }

        .tarjeta-2 a { background-color: #2a9d8f; }
        .tarjeta-2 a:hover { background-color: #1f7a6e; }
    </style>
</head>
<body>

    <h1>Paginas de GrandBlue</h1>
    <h2>Uade</h2>
    <p>Creado por: Luciano Mendez</p>
    <p>Diseño y desarrollo web</p>

    <div class="botones">
        <div class="tarjeta tarjeta-1">
            <h3>GrandBlue ONG</h3>
            <a href="ONG/index.html">Ver pagina</a>
        </div>
        <div class="tarjeta tarjeta-2">
            <h3>Identikit</h3>
            <a href="identikit/index.html">Ver pagina</a>
        </div>
    </div>

</body>
</html>
